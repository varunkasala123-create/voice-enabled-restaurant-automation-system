<!DOCTYPE html>
<html>
<head>
<title>Kitchen Screen</title>
<style>
body {
  background: black;
  color: white;
  font-family: Arial;
}
.order {
  border: 2px solid lime;
  padding: 20px;
  margin: 15px;
  font-size: 22px;
}
</style>
</head>

<body>
<h1>🍳 Kitchen Orders</h1>
<div id="orders"></div>

<script>
const ws = new WebSocket("ws://" + location.host + "/ws");

ws.onmessage = (event) => {
  const data = JSON.parse(event.data);

  const div = document.createElement("div");
  div.className = "order";

  div.innerHTML = `
    <b>${data.type.toUpperCase()}</b><br>
    TABLE ${data.table}<br>
    ${data.items ? data.items.join("<br>") : ""}
    ${data.message ? "<br>" + data.message : ""}
    ${data.amount ? "<br>Total: ₹" + data.amount : ""}
    ${data.rating ? "<br>Rating: " + data.rating : ""}
  `;

  document.getElementById("orders").prepend(div);
};
</script>

</body>
</html>
